name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e '.[test]'

      - name: Lint
        run: ruff check .

      # The e2e marker is deselected by default via addopts in pyproject.toml
      # (`-m 'not e2e'`), so this runs only the offline unit suite.
      - name: Test
        run: pytest -q
