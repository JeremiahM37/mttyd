# Verify mttyd — fully self-contained: verify boots mttyd's own uvicorn
# (config-less mode: any port allowed, empty history) and every check runs
# against that instance. No external service is required; earlier revisions
# depended on a private homelab deployment (127.0.0.1:9105) serving the
# wrapper page — that coupling is gone.
#
# Written for the verify v0.2 schema (backend/launch/steps). The old
# `checks:` format is silently ignored by verify >= 0.2.
# Run: `pip install -e '.[test]' verify-cli mss` into .venv, then
# `verify` from the repo root. backend: generic runs headless — steps are
# deterministic shell assertions, no display or vision model needed.
#
# Browser-level coverage lives in tests/test_e2e_playwright.py
# (pytest-playwright): boots this same server + a ttyd WebSocket stub and
# asserts the page renders xterm, boots sessions, and doesn't CPU-pin the
# event loop at init (the lockHelperAttrs/MutationObserver regression).
# Those are tagged `e2e`/deselected by default; run with
# `pip install -e '.[e2e]' && playwright install chromium && pytest -m e2e`.

backend: generic

launch:
  # Serve on a fixed loopback port for the duration of the run; verify
  # terminates the process when the steps finish.
  command: ".venv/bin/python -m uvicorn mttyd.server:create_app --factory --host 127.0.0.1 --port 8931 --log-level warning"
  wait_after: 1.0

steps:
  - name: unit tests
    actions:
      - shell: ".venv/bin/pytest -q"

  - name: lint
    actions:
      - shell: ".venv/bin/ruff check ."

  - name: server serves wrapper page and endpoints
    actions:
      # Readiness: healthz must answer within ~10s of launch.
      - shell: "for i in $(seq 1 50); do curl -sf http://127.0.0.1:8931/healthz >/dev/null && exit 0; sleep 0.2; done; exit 1"
      - shell: "curl -sf http://127.0.0.1:8931/term/7681 | grep -q createSession"
      - shell: "curl -sf http://127.0.0.1:8931/term/7681 | grep -q '/static/vendor/xterm-5.5.0.js'"
      - shell: "! curl -sf http://127.0.0.1:8931/term/7681 | grep -q cdn.jsdelivr.net"
      - shell: "test \"$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8931/term/notaport)\" = 400"
      - shell: "curl -sf 'http://127.0.0.1:8931/api/term/history?port=7681' | grep -q '\"commands\"'"

  - name: vendored xterm assets served locally
    actions:
      - shell: "curl -sf http://127.0.0.1:8931/static/vendor/xterm-5.5.0.css | grep -qi xterm"
      - shell: "test \"$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8931/static/vendor/xterm-5.5.0.js)\" = 200"
      - shell: "test \"$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8931/static/vendor/addon-fit-0.10.0.js)\" = 200"
      - shell: "test \"$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8931/static/vendor/addon-search-0.15.0.js)\" = 200"
