<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>mttyd</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #000;
                 overscroll-behavior: none; touch-action: none;
                 display: flex; flex-direction: column; color: #cbd5e1;
                 font-family: ui-sans-serif, system-ui, sans-serif; }
    /* Tab bar — only shown when there's more than one port. */
    #tabs { display: flex; height: 32px; background: #0b1020;
            border-bottom: 1px solid #1e293b; overflow-x: auto;
            overflow-y: hidden; flex-shrink: 0;
            -webkit-overflow-scrolling: touch; }
    #tabs.single { display: none; }
    .tab { display: inline-flex; align-items: center; gap: 6px;
           padding: 0 14px; height: 32px; background: transparent;
           border: 0; border-right: 1px solid #1e293b;
           color: #94a3b8; font: inherit; font-size: 13px;
           white-space: nowrap; cursor: pointer;
           touch-action: manipulation; }
    .tab.active { background: #1e293b; color: #e2e8f0;
                  box-shadow: inset 0 -2px 0 #6366f1; }
    .tab .dot { width: 6px; height: 6px; border-radius: 50%;
                background: transparent; display: inline-block; }
    .tab .dot.unread { background: #f59e0b; }
    .tab .tabClose { color: #64748b; font-size: 16px; padding: 0 2px;
                     margin-left: 2px; border-radius: 3px;
                     line-height: 1; touch-action: manipulation; }
    .tab .tabClose:active { background: #334155; color: #f87171; }
    .tab.tabAdd { color: #818cf8; font-size: 18px; min-width: 36px;
                  justify-content: center; padding: 0; font-weight: 600; }
    .tab.tabAdd:active { background: #1e293b; }
    /* Terminals container — fills remaining space, holds one wrap per port. */
    #terms { flex: 1; min-height: 0; position: relative; }
    .termWrap { position: absolute; inset: 0; display: flex;
                flex-direction: column; }
    .termWrap.hidden { display: none; }
    .termInner { flex: 1; min-height: 0; position: relative; }
    /* Shared top toolbar — positioned over the active term's top-right. */
    #toolbar { position: absolute; top: 4px; right: 4px; z-index: 5;
               display: flex; gap: 4px; }
    .toolbtn { background: #1e293b; border: 1px solid #334155;
               border-radius: 4px; color: #e2e8f0; height: 28px;
               padding: 0 10px; font-size: 12px; font-weight: 500;
               cursor: pointer; touch-action: manipulation;
               font-family: inherit; }
    .toolbtn.icon { width: 28px; padding: 0; font-size: 14px; }
    /* Hide toolbar while search is open so its buttons don't intercept clicks. */
    body:has(#searchbar.on) #toolbar { display: none; }
    /* Search bar overlay. */
    #searchbar { display: none; position: absolute; top: 0; left: 0; right: 0;
                 z-index: 4; background: rgba(15,23,42,0.95);
                 border-bottom: 1px solid #1e293b; padding: 6px;
                 align-items: center; gap: 6px; }
    #searchbar.on { display: flex; }
    #searchInput { flex: 1; background: #1e293b; border: 1px solid #334155;
                   color: #e2e8f0; border-radius: 4px; padding: 6px 8px;
                   font-size: 14px; min-width: 0; }
    #searchbar button { background: transparent; border: 0; color: #cbd5e1;
                        font-size: 16px; padding: 6px 10px;
                        touch-action: manipulation; }
    #searchbar button:active { color: #818cf8; }
    /* Reconnect overlay — one per termWrap, hidden by default. */
    .reconnect-overlay { display: none; position: absolute; inset: 0;
                         z-index: 6; background: rgba(0,0,0,0.75);
                         align-items: center; justify-content: center;
                         flex-direction: column; gap: 10px; }
    .reconnect-overlay.on { display: flex; }
    .reconnect-overlay button { background: #6366f1; color: white; border: 0;
                                padding: 12px 24px; border-radius: 6px;
                                font-size: 15px; font-weight: 600; }
    /* Snippets row (above keybar). */
    #snippetbar { display: none; height: 44px; background: #0b1020;
                  border-top: 1px solid #1e293b; flex-shrink: 0;
                  overflow-x: auto; overflow-y: hidden; white-space: nowrap;
                  -webkit-overflow-scrolling: touch; }
    #snippetbar.on { display: block; }
    .snipbtn { display: inline-block; height: 100%; padding: 0 14px;
               background: transparent; border: 0; border-right: 1px solid #1e293b;
               color: #cbd5e1; font-family: ui-monospace, Menlo, monospace;
               font-size: 13px; touch-action: manipulation; user-select: none; }
    .snipbtn:active { background: #1e293b; color: #818cf8; }
    /* Bottom key bar. */
    #keybar { display: flex; height: 44px; background: #0b1020;
              border-top: 1px solid #1e293b; flex-shrink: 0;
              padding-bottom: env(safe-area-inset-bottom, 0); }
    #keybar.off { display: none; }
    .keybtn { flex: 1; background: transparent; border: 0;
              border-right: 1px solid #1e293b; color: #cbd5e1;
              font-family: ui-monospace, Menlo, monospace; font-size: 16px;
              touch-action: manipulation; user-select: none; }
    .keybtn:last-child { border-right: 0; }
    .keybtn:active { background: #1e293b; color: #818cf8; }
    .keybtn.long { color: #818cf8; }
    /* Settings drawer. */
    #settings { display: none; position: fixed; inset: 0; z-index: 10;
                background: rgba(0,0,0,0.7); align-items: center;
                justify-content: center; padding: 16px; }
    #settings.on { display: flex; }
    #settings .panel { background: #0f172a; border: 1px solid #1e293b;
                       border-radius: 8px; padding: 16px; max-width: 480px;
                       width: 100%; max-height: 90vh; overflow-y: auto;
                       font-size: 14px; }
    #settings h2 { margin: 0 0 12px 0; font-size: 16px; }
    #settings label { display: flex; align-items: center; gap: 8px;
                      margin: 8px 0; cursor: pointer; }
    #settings input[type=range] { flex: 1; }
    #settings textarea { width: 100%; box-sizing: border-box; background: #1e293b;
                         color: #e2e8f0; border: 1px solid #334155;
                         border-radius: 4px; padding: 6px;
                         font-family: ui-monospace, Menlo, monospace; font-size: 12px; }
    #settings details summary { cursor: pointer; padding: 6px 0; color: #94a3b8; }
    #settings .done { width: 100%; margin-top: 12px; background: #6366f1;
                      color: white; border: 0; padding: 10px;
                      border-radius: 6px; font-weight: 600; }
    /* Paste fallback modal — used when navigator.clipboard.readText fails,
       which happens on HTTP (non-secure-context) connections. User pastes
       via the OS keyboard's long-press menu, then taps Send. */
    #paster { display: none; position: fixed; inset: 0; z-index: 10;
              background: rgba(0,0,0,0.7); align-items: center;
              justify-content: center; padding: 16px; }
    #paster.on { display: flex; }
    #paster .panel { background: #0f172a; border: 1px solid #1e293b;
                     border-radius: 8px; padding: 16px; max-width: 480px;
                     width: 100%; font-size: 14px; }
    #paster h2 { margin: 0 0 4px 0; font-size: 16px; }
    #paster .hint { color: #94a3b8; font-size: 12px; margin-bottom: 8px; }
    #paster textarea { width: 100%; box-sizing: border-box; min-height: 100px;
                       background: #1e293b; color: #e2e8f0;
                       border: 1px solid #334155; border-radius: 4px;
                       padding: 6px; font-family: ui-monospace, Menlo, monospace;
                       font-size: 13px; }
    #paster .row { display: flex; gap: 8px; margin-top: 12px; }
    #paster .row button { flex: 1; padding: 10px; border: 0;
                          border-radius: 6px; font-weight: 600; font-size: 14px; }
    #paster .send { background: #6366f1; color: white; }
    #paster .cancel { background: #334155; color: #e2e8f0; }
  </style>
</head>
<body>
  <div id="tabs"></div>
  <div id="terms">
    <div id="toolbar">
      <button id="searchBtn"   class="toolbtn" aria-label="search">Find</button>
      <button id="copyBtn"     class="toolbtn" aria-label="copy">Copy</button>
      <button id="pasteBtn"    class="toolbtn" aria-label="paste">Paste</button>
      <button id="settingsBtn" class="toolbtn icon" aria-label="settings">⚙</button>
    </div>
    <div id="searchbar">
      <input id="searchInput" type="text" placeholder="search..."
             autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button id="searchPrev" aria-label="previous">↑</button>
      <button id="searchNext" aria-label="next">↓</button>
      <button id="searchClose" aria-label="close">✕</button>
    </div>
  </div>
  <div id="snippetbar"></div>
  <div id="keybar">
    <button class="keybtn" data-seq="\x1b[A" data-seq-long="\x1b[5~">↑</button>
    <button class="keybtn" data-seq="\x1b[B" data-seq-long="\x1b[6~">↓</button>
    <button class="keybtn" data-seq="\x1b[D" data-seq-long="\x1b[H">←</button>
    <button class="keybtn" data-seq="\x1b[C" data-seq-long="\x1b[F">→</button>
    <button class="keybtn" data-seq="\t"     data-seq-long="\x1b[Z">Tab</button>
    <button class="keybtn" data-seq="\x1b">Esc</button>
    <button class="keybtn" data-seq="\x03"   data-seq-long="\x04">^C</button>
  </div>
  <div id="paster">
    <div class="panel">
      <h2>Paste</h2>
      <div class="hint">Long-press the box below and pick "Paste" from your keyboard, then tap Send.</div>
      <textarea id="pasterText" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
      <div class="row">
        <button class="cancel" id="pasterCancel">Cancel</button>
        <button class="send" id="pasterSend">Send</button>
      </div>
    </div>
  </div>
  <div id="settings">
    <div class="panel">
      <h2>Settings</h2>
      <label>Font size <input type="range" id="setFont" min="8" max="30" step="1"></label>
      <label>Theme
        <select id="setTheme">
          <option value="dark">Dark</option>
          <option value="light">Light</option>
          <option value="solarized-dark">Solarized Dark</option>
          <option value="dracula">Dracula</option>
          <option value="nord">Nord</option>
        </select>
      </label>
      <label><input type="checkbox" id="setKeybar"> Show key bar (arrows/Tab/Esc/^C)</label>
      <label><input type="checkbox" id="setLongpress"> Long-press keys for Home/End/PgUp/PgDn/^D</label>
      <label><input type="checkbox" id="setAutoReconnect"> Auto-reconnect when connection drops</label>
      <label><input type="checkbox" id="setWakeLock"> Keep screen on while terminal is open</label>
      <label><input type="checkbox" id="setSnippets"> Show snippets bar</label>
      <details>
        <summary>Snippets (one per line, format: <code>label|command</code>)</summary>
        <textarea id="setSnippetsText" rows="6" placeholder="ls|ls -la&#10;dps|docker ps&#10;tls|tmux ls"></textarea>
      </details>
      <button id="settingsDone" class="done">Done</button>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-search@0.15.0/lib/addon-search.js"></script>
  <script>
    // mttyd multi-tab wrapper.
    //
    // Server passes either a single port or an array of ports via __PORTS__.
    // We create one xterm + WS per port, all eager (so background tabs keep
    // receiving output). One shared toolbar / keybar / settings drawer
    // operates on whichever tab is active.

    const PORTS = __PORTS__;
    const HOST  = location.hostname;

    // ── settings (shared across all tabs) ───────────────────────────────
    const SETTINGS_KEY = 'mttyd_settings';
    const DEFAULTS = {
      fontSize: 12,
      theme: 'dark',
      keybar: true,
      snippets: false,
      snippetsText: '',
      longpress: true,
      autoReconnect: true,
      wakeLock: false,
    };
    const THEMES = {
      'dark':           { background: '#000000', foreground: '#cbd5e1', cursor: '#cbd5e1' },
      'light':          { background: '#ffffff', foreground: '#0f172a', cursor: '#0f172a',
                          selectionBackground: '#94a3b8' },
      'solarized-dark': { background: '#002b36', foreground: '#839496', cursor: '#93a1a1',
                          black: '#073642', red: '#dc322f', green: '#859900', yellow: '#b58900',
                          blue: '#268bd2', magenta: '#d33682', cyan: '#2aa198', white: '#eee8d5' },
      'dracula':        { background: '#282a36', foreground: '#f8f8f2', cursor: '#f8f8f2',
                          black: '#21222c', red: '#ff5555', green: '#50fa7b', yellow: '#f1fa8c',
                          blue: '#bd93f9', magenta: '#ff79c6', cyan: '#8be9fd', white: '#f8f8f2' },
      'nord':           { background: '#2e3440', foreground: '#d8dee9', cursor: '#d8dee9',
                          black: '#3b4252', red: '#bf616a', green: '#a3be8c', yellow: '#ebcb8b',
                          blue: '#81a1c1', magenta: '#b48ead', cyan: '#88c0d0', white: '#e5e9f0' },
    };
    function loadSettings() {
      try { return Object.assign({}, DEFAULTS, JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}')); }
      catch (_) { return Object.assign({}, DEFAULTS); }
    }
    function saveSettings() { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }
    let settings = loadSettings();

    // HTML attrs hold control sequences as readable text like "\x1b[A"
    // (the browser doesn't parse JS-style escapes from attributes).
    // decodeSeq converts those back into actual bytes before sending.
    function decodeSeq(s) {
      return (s || '')
        .replace(/\\x([0-9a-fA-F]{2})/g, (_, hex) => String.fromCharCode(parseInt(hex, 16)))
        .replace(/\\t/g, '\t').replace(/\\r/g, '\r').replace(/\\n/g, '\n');
    }

    // Mobile keyboard fix on every xterm helper textarea.
    // NOTE: inputmode is deliberately left unset (defaults to "text") so
    // that Gboard enters composition mode. With composition, xterm.js
    // buffers keystrokes and sends the final word on compositionend —
    // which means tapping an autocorrect suggestion Just Works.
    // inputmode="url" was previously used to suppress the prediction bar,
    // but it broke composition and caused autocorrect to append instead
    // of replace.  autocorrect="off" prevents unwanted auto-insertions
    // on space while still allowing the user to deliberately tap suggestions.
    const HELPER_ATTRS = {
      autocomplete: 'off', autocorrect: 'off', autocapitalize: 'none',
      spellcheck: 'false',
      inputmode: 'url',           // strictest "no autocorrect" hint on Android
      'data-gramm': 'false', 'data-gramm_editor': 'false',
    };
    // _locking flag breaks the observer-fires-on-our-own-setAttribute loop
    // that would happen if we observed attribute mutations as well as
    // childList. We DO want to observe attribute mutations (xterm.js
    // resets inputmode= after we set it, for example), and the flag lets
    // us re-set without retriggering ourselves.
    let _lockingHelperAttrs = false;
    const _autocorrectGuardedTextareas = new WeakSet();
    function lockHelperAttrs() {
      if (_lockingHelperAttrs) return;
      _lockingHelperAttrs = true;
      try {
        document.querySelectorAll('.xterm-helper-textarea').forEach(h => {
          for (const [k, v] of Object.entries(HELPER_ATTRS)) {
            if (h.getAttribute(k) !== v) h.setAttribute(k, v);
          }
          // Last-line defense: when the user taps an autocorrect suggestion,
          // Gboard ignores our autocomplete=off/inputmode=url hints and
          // fires input events with inputType=insertReplacementText (and
          // related). xterm.js v5's input handler mis-applies these,
          // producing "tetingsting"-style garbled output. We swallow them
          // in the capture phase so xterm.js never sees the corrupted event.
          if (!_autocorrectGuardedTextareas.has(h)) {
            _autocorrectGuardedTextareas.add(h);
            const BLOCKED_INPUT_TYPES = new Set([
              'insertReplacementText', 'insertFromComposition',
              'insertFromYank', 'insertFromDrop', 'insertFromPaste',
              'insertFromPasteAsQuotation',
            ]);
            const eat = (e) => {
              if (e.inputType && BLOCKED_INPUT_TYPES.has(e.inputType)) {
                e.stopImmediatePropagation();
                if (e.cancelable) e.preventDefault();
                h.value = '';   // also wipe so any read-after path sees nothing
              }
            };
            h.addEventListener('beforeinput', eat, { capture: true });
            h.addEventListener('input',       eat, { capture: true });
          }
        });
      } finally {
        _lockingHelperAttrs = false;
      }
    }

    // Mobile autocorrect fix.
    //
    // xterm.js + Gboard has two bugs:
    //  1. Chars leak through onData DURING composition (before compositionend).
    //  2. After compositionend, a redundant `input` event fires and xterm.js
    //     processes it as a second diff (e.g. "teting"→"testing" produces
    //     extra "sting").
    //
    // Fix:
    //  - Track everything xterm.js sends via onData during composition.
    //  - On compositionend (bubble phase, after xterm.js), compare the
    //    effective input with e.data and send DEL + correct text if wrong.
    //  - Suppress the redundant input event that follows compositionend
    //    (capture phase, before xterm.js sees it).
    const _hooked = new WeakSet();
    function hookAutoCorrect(term, ws) {
      const ta = term.textarea;
      if (!ta || _hooked.has(ta)) return;
      _hooked.add(ta);

      let inComp = false;
      let compSent = '';        // raw chars from onData during composition
      let suppressInput = false;

      // Accumulate everything xterm.js sends during composition.
      term.onData(d => { if (inComp) compSent += d; });

      ta.addEventListener('compositionstart', () => {
        inComp = true;
        compSent = '';
      });

      // Bubble phase (runs AFTER xterm.js's compositionend handler which
      // fires onData synchronously). By now compSent has all leaked chars
      // + whatever compositionend produced.
      ta.addEventListener('compositionend', (e) => {
        inComp = false;
        suppressInput = true;
        setTimeout(() => { suppressInput = false; }, 100); // safety reset

        const desired = e.data || '';
        if (!desired) { compSent = ''; return; }

        // Compute effective input: printable chars minus DELs/backspaces.
        let effective = '';
        for (const ch of compSent) {
          const c = ch.charCodeAt(0);
          if (c === 0x7f || c === 0x08) effective = effective.slice(0, -1);
          else if (c >= 32) effective += ch;
        }

        if (effective !== desired) {
          const del = '\x7f'.repeat(effective.length);
          if (ws.readyState === WebSocket.OPEN) {
            sendWs(ws, '0', del + desired);
          }
        }
        compSent = '';
      });

      // Capture phase: suppress the input event that fires right after
      // compositionend — it causes xterm.js to compute a redundant diff
      // (e.g. "sting" from textarea "teting"→"testing").
      ta.addEventListener('input', (e) => {
        if (suppressInput) {
          suppressInput = false;
          e.stopImmediatePropagation();
        }
      }, true);

      // Spellcheck tap on already-committed text (no composition).
      ta.addEventListener('beforeinput', (e) => {
        if (e.inputType !== 'insertReplacementText') return;
        let replacement = '';
        try { replacement = e.dataTransfer.getData('text/plain'); } catch (_) {}
        if (!replacement) replacement = e.data || '';
        if (!replacement) return;

        e.preventDefault();
        e.stopImmediatePropagation();

        let deleteCount = 0;
        try {
          const ranges = e.getTargetRanges();
          if (ranges.length > 0)
            deleteCount = ranges[0].endOffset - ranges[0].startOffset;
        } catch (_) {}
        if (deleteCount === 0) deleteCount = ta.value.length;

        const del = '\x7f'.repeat(deleteCount);
        if (ws.readyState === WebSocket.OPEN) sendWs(ws, '0', del + replacement);
        ta.value = '';
      }, true);
    }

    // Wake Lock — released when tab is hidden, re-acquired when visible.
    let wakeLock = null;
    async function acquireWakeLock() {
      if (!settings.wakeLock || !navigator.wakeLock || wakeLock) return;
      try { wakeLock = await navigator.wakeLock.request('screen'); } catch (_) {}
    }
    async function releaseWakeLock() {
      if (wakeLock) { try { await wakeLock.release(); } catch (_) {} wakeLock = null; }
    }
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') acquireWakeLock();
      else releaseWakeLock();
    });

    // ttyd WebSocket helper. JSON_DATA opcode is '{' (literal '{'); sending
    // '2' would be PAUSE and the inner command never spawns.
    const enc = new TextEncoder();
    const dec = new TextDecoder('utf-8');
    function sendWs(ws, prefix, payload) {
      const body = enc.encode(payload);
      const buf  = new Uint8Array(body.length + 1);
      buf[0] = prefix.charCodeAt(0);
      buf.set(body, 1);
      ws.send(buf);
    }

    // ── per-port session ────────────────────────────────────────────────
    const sessions = [];
    let activeIdx = 0;

    function createSession(port, sessionArg, sessionIdx) {
      const wrap = document.createElement('div');
      wrap.className = 'termWrap hidden';
      wrap.dataset.port = port;
      if (sessionArg) wrap.dataset.sessionArg = sessionArg;

      const inner = document.createElement('div');
      inner.className = 'termInner';
      wrap.appendChild(inner);

      const overlay = document.createElement('div');
      overlay.className = 'reconnect-overlay';
      overlay.innerHTML = '<div>connection closed</div><button class="reconBtn">reconnect</button>';
      overlay.querySelector('.reconBtn').addEventListener('click', () => location.reload());
      wrap.appendChild(overlay);

      document.getElementById('terms').appendChild(wrap);

      const term   = new window.Terminal({
        fontSize: settings.fontSize,
        fontFamily: 'Consolas, Menlo, Monaco, "Courier New", monospace',
        cursorBlink: true, scrollback: 100000,
        theme: THEMES[settings.theme] || THEMES.dark,
        // SearchAddon's match-highlighting decorations are flagged as
        // proposed API in xterm.js — without this flag, findNext runs
        // silently with no visible highlight, which looks like "search
        // doesn't work".
        allowProposedApi: true,
      });
      const fit    = new window.FitAddon.FitAddon();
      const search = new window.SearchAddon.SearchAddon();
      term.loadAddon(fit); term.loadAddon(search);
      term.open(inner); fit.fit();

      // Optional `?arg=NAME` passes a session name through ttyd's --url-arg
      // flag to the pwa-claude-tmux wrapper, giving each tab an independent
      // tmux session (claude / claude-2 / claude-3 / etc.).
      const wsUrl = 'ws://' + HOST + ':' + port + '/ws'
                  + (sessionArg ? '?arg=' + encodeURIComponent(sessionArg) : '');
      const ws = new WebSocket(wsUrl, ['tty']);
      ws.binaryType = 'arraybuffer';

      const session = { port, sessionArg, term, fit, search, ws, wrap, inner,
                        overlay, reconnectAttempts: 0, hasUnread: false };

      ws.onopen = () => sendWs(ws, '{',
        JSON.stringify({ AuthToken: "", columns: term.cols, rows: term.rows }));

      ws.onmessage = (ev) => {
        const buf  = new Uint8Array(ev.data);
        const kind = String.fromCharCode(buf[0]);
        if (kind === '0') {
          term.write(dec.decode(buf.slice(1)));
          // Mark unread dot on background tabs.
          const myIdx = sessions.indexOf(session);
          if (myIdx !== activeIdx && !session.hasUnread) {
            session.hasUnread = true;
            const dot = tabsEl.querySelector(`.tab[data-idx="${myIdx}"] .dot`);
            if (dot) dot.classList.add('unread');
          }
        } else if (kind === '1') {
          if (sessions.indexOf(session) === activeIdx) {
            document.title = dec.decode(buf.slice(1));
          }
        }
      };
      ws.onclose = () => {
        term.writeln('\r\n[connection closed]\r\n');
        if (settings.autoReconnect && session.reconnectAttempts < 3) {
          setTimeout(() => location.reload(), 1000 * Math.pow(2, session.reconnectAttempts++));
        } else {
          overlay.classList.add('on');
        }
      };
      term.onData(d => { if (ws.readyState === WebSocket.OPEN) sendWs(ws, '0', d); });
      hookAutoCorrect(term, ws);

      function doResize() {
        if (wrap.classList.contains('hidden')) return;   // skip background tabs
        fit.fit();
        if (ws.readyState === WebSocket.OPEN) {
          sendWs(ws, '1', JSON.stringify({ columns: term.cols, rows: term.rows }));
        }
      }
      session.resize = doResize;
      window.addEventListener('resize', doResize);
      new ResizeObserver(doResize).observe(inner);
      if (document.fonts && document.fonts.ready) document.fonts.ready.then(doResize);

      // Smooth pointer-event scroll, per-term.
      // ─ Hold finger still ~500ms → enter line-selection mode. Drag extends
      //   by line, lift copies the selection to clipboard and flashes the
      //   Copy button. This is how you actually grab text out of the
      //   terminal on a phone (xterm.js's native selection competes with
      //   our scroll handler and loses).
      (function smoothScroll() {
        const PX_PER_LINE = 7, FRICTION = 0.93, STOP_V = 0.04;
        const LP_MS = 500, LP_MOVE_TOLERANCE = 10;
        let startY = null, prevY = 0, prevT = 0;
        let scrolledLines = 0, velocity = 0, raf = null, activePtr = -1;
        let lpTimer = null, selecting = false, selStartRow = null;

        function lineAtY(clientY) {
          const rect = inner.getBoundingClientRect();
          const relY = clientY - rect.top;
          const lineH = rect.height / term.rows;
          const visRow = Math.max(0, Math.min(term.rows - 1, Math.floor(relY / lineH)));
          return term.buffer.active.viewportY + visRow;
        }

        function step() {
          const now = performance.now();
          const dt = now - prevT; prevT = now;
          velocity *= Math.pow(FRICTION, dt / 16);
          if (Math.abs(velocity) < STOP_V) { raf = null; return; }
          const lines = Math.round(velocity * dt / PX_PER_LINE);
          if (lines !== 0) term.scrollLines(lines);
          raf = requestAnimationFrame(step);
        }
        inner.addEventListener('pointerdown', e => {
          if (e.pointerType !== 'touch') return;
          if (raf !== null) { cancelAnimationFrame(raf); raf = null; }
          try { inner.setPointerCapture(e.pointerId); } catch (_) {}
          activePtr = e.pointerId;
          startY = e.clientY; prevY = startY;
          prevT = performance.now();
          scrolledLines = 0; velocity = 0; selecting = false;
          // Arm long-press timer.
          if (lpTimer) clearTimeout(lpTimer);
          lpTimer = setTimeout(() => {
            lpTimer = null;
            selecting = true;
            selStartRow = lineAtY(startY);
            term.selectLines(selStartRow, selStartRow);
            if (navigator.vibrate) navigator.vibrate(30);
          }, LP_MS);
        });
        inner.addEventListener('pointermove', e => {
          if (e.pointerId !== activePtr || startY === null) return;
          // If we've moved enough before the LP timer fires, treat as scroll.
          if (lpTimer && Math.abs(e.clientY - startY) > LP_MOVE_TOLERANCE) {
            clearTimeout(lpTimer); lpTimer = null;
          }
          if (selecting) {
            const row = lineAtY(e.clientY);
            term.selectLines(Math.min(selStartRow, row), Math.max(selStartRow, row));
            if (e.cancelable) e.preventDefault();
            return;
          }
          const y = e.clientY, t = performance.now();
          const targetLines = Math.round((startY - y) / PX_PER_LINE);
          const delta = targetLines - scrolledLines;
          if (delta !== 0) { term.scrollLines(delta); scrolledLines = targetLines; }
          velocity = (prevY - y) / Math.max(t - prevT, 1);
          prevY = y; prevT = t;
          if (e.cancelable) e.preventDefault();
        });
        function endPtr(e) {
          if (e.pointerId !== activePtr) return;
          if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; }
          activePtr = -1; startY = null;
          try { inner.releasePointerCapture(e.pointerId); } catch (_) {}
          if (selecting) {
            selecting = false;
            const text = term.getSelection();
            if (text) {
              copyText(text).then(ok => {
                if (ok) flashCopy(document.getElementById('copyBtn'));
              });
              setTimeout(() => term.clearSelection(), 600);
            }
            return;
          }
          if (Math.abs(velocity) > STOP_V) {
            prevT = performance.now();
            raf = requestAnimationFrame(step);
          }
        }
        inner.addEventListener('pointerup', endPtr);
        inner.addEventListener('pointercancel', endPtr);
      })();

      return session;
    }

    // ── tab management ─────────────────────────────────────────────────
    // Each tab is one xterm + WS pair. The tabs array drives everything;
    // tab buttons are rendered from it on every change. Extra (non-primary)
    // tabs are saved to localStorage so they restore on reload.
    //
    // A "primary" tab is one that came from the URL's port list — they
    // can't be closed (the URL says they should be there). Extra tabs are
    // user-added via the "+" button; they CAN be killed.
    //
    // Multi-port URLs (e.g. /term/7681,7691) still work and produce one
    // primary tab per port; the "+" button only appears for single-port
    // URLs (the multiple-claudes-per-machine use case).
    const tabsEl = document.getElementById('tabs');
    const SINGLE_PORT = PORTS.length === 1;
    const EXTRA_KEY = 'mttyd_extra_tabs_' + PORTS.join('_');

    function loadExtraTabs() {
      try { return JSON.parse(localStorage.getItem(EXTRA_KEY) || '[]'); }
      catch (_) { return []; }
    }
    function saveExtraTabs(extras) {
      localStorage.setItem(EXTRA_KEY, JSON.stringify(extras));
    }

    function generateSessionName(port) {
      // Try claude-2, claude-3, ... and pick the first one not already a tab.
      const used = new Set(sessions
        .filter(s => s.port === port && s.sessionArg)
        .map(s => s.sessionArg));
      for (let i = 2; i < 1000; i++) {
        const name = 'claude-' + i;
        if (!used.has(name)) return name;
      }
      return 'claude-' + Date.now();
    }

    function active() { return sessions[activeIdx]; }

    function renderTabBar() {
      tabsEl.innerHTML = '';
      sessions.forEach((s, i) => {
        const t = document.createElement('button');
        t.className = 'tab' + (i === activeIdx ? ' active' : '');
        t.dataset.idx = i;
        const label = s.sessionArg || (SINGLE_PORT ? 'claude' : String(s.port));
        const closable = !!s.sessionArg;   // only extra (session-arg) tabs can close
        t.innerHTML =
          `<span>${label}</span>` +
          `<span class="dot${s.hasUnread ? ' unread' : ''}"></span>` +
          (closable ? `<span class="tabClose" title="close">×</span>` : '');
        t.addEventListener('click', e => {
          if (e.target.classList.contains('tabClose')) {
            e.stopPropagation();
            closeSessionTab(i);
          } else {
            setActive(i);
          }
        });
        tabsEl.appendChild(t);
      });
      // "+" only when single-port URL — multi-port mode means tabs-as-machines,
      // not tabs-as-sessions, so adding a session-arg tab there is ambiguous.
      if (SINGLE_PORT) {
        const plus = document.createElement('button');
        plus.className = 'tab tabAdd';
        plus.id = 'tabAdd';
        plus.title = 'new session';
        plus.textContent = '+';
        plus.addEventListener('click', () => addSessionTab());
        tabsEl.appendChild(plus);
      }
      // Visible only when there's something to switch between (>=2 tabs)
      // or the "+" button is available.
      tabsEl.classList.toggle('single', sessions.length === 1 && !SINGLE_PORT);
    }

    function setActive(idx) {
      if (idx < 0 || idx >= sessions.length) return;
      sessions.forEach((s, i) => {
        s.wrap.classList.toggle('hidden', i !== idx);
        if (i === idx) {
          s.hasUnread = false;
          s.term.focus();
        }
      });
      activeIdx = idx;
      renderTabBar();
      requestAnimationFrame(() => active().resize());
      const s = active();
      location.hash = '#' + (s.sessionArg || s.port);
    }

    function addSessionTab() {
      if (!SINGLE_PORT) return;
      const port = PORTS[0];
      const sessionArg = generateSessionName(port);
      const sess = createSession(port, sessionArg);
      sessions.push(sess);
      // Persist
      const extras = loadExtraTabs();
      extras.push({ port, sessionArg });
      saveExtraTabs(extras);
      setActive(sessions.length - 1);
    }

    async function closeSessionTab(idx) {
      const s = sessions[idx];
      if (!s.sessionArg) return;   // primary tabs aren't closable
      try { s.ws.close(); } catch (_) {}
      // Ask the server to kill the tmux session so it doesn't zombie out.
      try {
        await fetch('/api/term/kill?session=' + encodeURIComponent(s.sessionArg),
                    { method: 'POST' });
      } catch (_) {}
      s.wrap.remove();
      sessions.splice(idx, 1);
      // Drop from localStorage
      const extras = loadExtraTabs().filter(e =>
        !(e.port === s.port && e.sessionArg === s.sessionArg));
      saveExtraTabs(extras);
      if (activeIdx >= sessions.length) activeIdx = sessions.length - 1;
      setActive(Math.max(0, activeIdx));
    }

    // ── boot: create primary tabs from URL, restore extras from storage ──
    PORTS.forEach(port => sessions.push(createSession(port, null)));
    if (SINGLE_PORT) {
      for (const ex of loadExtraTabs()) {
        sessions.push(createSession(ex.port, ex.sessionArg));
      }
    }
    lockHelperAttrs();
    // Observe BOTH new elements AND attribute changes on our locked attrs.
    // xterm.js or browser quirks can clear inputmode etc. after we set it,
    // so we need to re-apply on attribute mutation, not just element churn.
    new MutationObserver(lockHelperAttrs).observe(document.body, {
      childList: true, subtree: true,
      attributes: true, attributeFilter: Object.keys(HELPER_ATTRS),
    });
    renderTabBar();
    setActive(0);

    // Honor URL hash (#7691 or #claude-2) to start on a specific tab.
    const hashTok = location.hash.replace('#', '');
    if (hashTok) {
      const i = sessions.findIndex(s =>
        (s.sessionArg && s.sessionArg === hashTok) ||
        (!s.sessionArg && String(s.port) === hashTok));
      if (i >= 0) setActive(i);
    }

    // ── shared keybar with long-press ──────────────────────────────────
    const LONGPRESS_MS = 500;
    document.querySelectorAll('.keybtn').forEach(btn => {
      let timer = null, fired = false;
      function clearT() { if (timer) { clearTimeout(timer); timer = null; } }
      btn.addEventListener('pointerdown', e => {
        e.preventDefault();
        fired = false;
        const longSeq = decodeSeq(btn.dataset.seqLong);
        if (settings.longpress && longSeq) {
          timer = setTimeout(() => {
            fired = true;
            const s = active();
            if (s.ws.readyState === WebSocket.OPEN) sendWs(s.ws, '0', longSeq);
            btn.classList.add('long');
            if (navigator.vibrate) navigator.vibrate(20);
            setTimeout(() => btn.classList.remove('long'), 150);
          }, LONGPRESS_MS);
        }
      });
      btn.addEventListener('pointerup', () => {
        clearT();
        if (!fired) {
          const s = active();
          if (s.ws.readyState === WebSocket.OPEN) sendWs(s.ws, '0', decodeSeq(btn.dataset.seq));
        }
      });
      btn.addEventListener('pointerleave', clearT);
      btn.addEventListener('pointercancel', clearT);
    });

    // ── settings + snippets ─────────────────────────────────────────────
    function parseSnippets(text) {
      return text.split('\n').map(line => {
        line = line.trim();
        if (!line) return null;
        const i = line.indexOf('|');
        return i >= 0
          ? { label: line.slice(0, i).trim(), cmd: line.slice(i + 1).trim() }
          : { label: line.slice(0, 12), cmd: line };
      }).filter(Boolean);
    }
    function renderSnippets() {
      const bar = document.getElementById('snippetbar');
      const items = parseSnippets(settings.snippetsText);
      bar.innerHTML = items.map(s =>
        `<button class="snipbtn" data-cmd="${s.cmd.replace(/"/g, '&quot;')}">${s.label}</button>`
      ).join('');
      bar.classList.toggle('on', settings.snippets && items.length > 0);
      bar.querySelectorAll('.snipbtn').forEach(b => {
        b.addEventListener('click', () => {
          const s = active();
          if (s.ws.readyState === WebSocket.OPEN) sendWs(s.ws, '0', b.dataset.cmd + '\r');
        });
      });
    }
    function applySettings() {
      sessions.forEach(s => {
        s.term.options.fontSize = settings.fontSize;
        s.term.options.theme    = THEMES[settings.theme] || THEMES.dark;
      });
      document.getElementById('keybar').classList.toggle('off', !settings.keybar);
      renderSnippets();
      if (settings.wakeLock) acquireWakeLock(); else releaseWakeLock();
      // Defer the refit by two animation frames so xterm.js has time to
      // re-measure cell width/height at the new fontSize. Calling fit.fit()
      // synchronously here picks up stale cell metrics → terminal claims
      // 80 cols when only 30 actually fit → output runs off the right edge
      // without wrapping. Same fix helps theme changes.
      requestAnimationFrame(() => requestAnimationFrame(() => {
        sessions.forEach(s => s.resize());
      }));
    }
    applySettings();

    const drawer = document.getElementById('settings');
    function syncForm() {
      document.getElementById('setFont').value = settings.fontSize;
      document.getElementById('setTheme').value = settings.theme;
      document.getElementById('setKeybar').checked = settings.keybar;
      document.getElementById('setLongpress').checked = settings.longpress;
      document.getElementById('setAutoReconnect').checked = settings.autoReconnect;
      document.getElementById('setWakeLock').checked = settings.wakeLock;
      document.getElementById('setSnippets').checked = settings.snippets;
      document.getElementById('setSnippetsText').value = settings.snippetsText;
    }
    document.getElementById('settingsBtn').addEventListener('click', () => {
      syncForm();
      drawer.classList.add('on');
    });
    document.getElementById('settingsDone').addEventListener('click', () => {
      settings.fontSize      = parseInt(document.getElementById('setFont').value) || DEFAULTS.fontSize;
      settings.theme         = document.getElementById('setTheme').value;
      settings.keybar        = document.getElementById('setKeybar').checked;
      settings.longpress     = document.getElementById('setLongpress').checked;
      settings.autoReconnect = document.getElementById('setAutoReconnect').checked;
      settings.wakeLock      = document.getElementById('setWakeLock').checked;
      settings.snippets      = document.getElementById('setSnippets').checked;
      settings.snippetsText  = document.getElementById('setSnippetsText').value;
      saveSettings();
      applySettings();
      drawer.classList.remove('on');
    });
    drawer.addEventListener('click', e => { if (e.target === drawer) drawer.classList.remove('on'); });

    // ── search bar (operates on active tab) ─────────────────────────────
    const searchbar = document.getElementById('searchbar');
    const searchInput = document.getElementById('searchInput');
    function doSearch(dir) {
      const q = searchInput.value;
      if (!q) return;
      const opts = { decorations: { matchBackground: '#6366f1',
                                    activeMatchBackground: '#a855f7' } };
      const sr = active().search;
      if (dir === 'next') sr.findNext(q, opts);
      else                sr.findPrevious(q, opts);
    }
    document.getElementById('searchBtn').addEventListener('click', () => {
      searchbar.classList.add('on');
      searchInput.focus();
    });
    document.getElementById('searchNext').addEventListener('click', () => doSearch('next'));
    document.getElementById('searchPrev').addEventListener('click', () => doSearch('prev'));
    document.getElementById('searchClose').addEventListener('click', () => {
      searchbar.classList.remove('on');
      sessions.forEach(s => s.search.clearDecorations());
    });
    searchInput.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); doSearch(e.shiftKey ? 'prev' : 'next'); }
      if (e.key === 'Escape') { e.preventDefault(); searchbar.classList.remove('on'); }
    });

    // ── copy/paste (active tab) ─────────────────────────────────────────
    // Selecting text on mobile is fiddly (touch handlers + xterm.js compete),
    // so Copy falls back to "everything in the visible viewport" if there's
    // no explicit selection — that's what users actually want 90% of the time
    // (grab the error on screen and paste it elsewhere).
    async function copyText(text) {
      if (!text) return false;
      try {
        await navigator.clipboard.writeText(text);
        return true;
      } catch (_) {
        // Fallback for non-HTTPS contexts where the Clipboard API is blocked.
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;top:-9999px;opacity:0';
        document.body.appendChild(ta);
        ta.select();
        let ok = false;
        try { ok = document.execCommand('copy'); } catch (_) {}
        document.body.removeChild(ta);
        return ok;
      }
    }
    function visibleText(term) {
      const buf = term.buffer.active;
      const startY = buf.viewportY;
      const lines = [];
      for (let y = startY; y < startY + term.rows; y++) {
        const line = buf.getLine(y);
        if (line) lines.push(line.translateToString(true));
      }
      // Trim trailing blank lines so we don't paste a screenful of whitespace.
      while (lines.length && !lines[lines.length - 1].trim()) lines.pop();
      return lines.join('\n');
    }
    function flashCopy(btn) {
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = orig; }, 900);
    }
    document.getElementById('copyBtn').addEventListener('click', async () => {
      const t = active().term;
      const text = t.getSelection() || visibleText(t);
      if (await copyText(text)) flashCopy(document.getElementById('copyBtn'));
    });
    // Paste: try the modern Clipboard API first. If that fails (non-HTTPS
    // context, permission denied, empty, etc.), open the fallback modal so
    // the user can paste via the OS keyboard and tap Send.
    function sendToActive(text) {
      if (!text) return;
      const s = active();
      if (s.ws.readyState === WebSocket.OPEN) sendWs(s.ws, '0', text);
    }
    const paster = document.getElementById('paster');
    const pasterText = document.getElementById('pasterText');
    function openPaster() {
      pasterText.value = '';
      paster.classList.add('on');
      setTimeout(() => pasterText.focus(), 50);
    }
    function closePaster() { paster.classList.remove('on'); }
    document.getElementById('pasterCancel').addEventListener('click', closePaster);
    document.getElementById('pasterSend').addEventListener('click', () => {
      sendToActive(pasterText.value);
      closePaster();
    });
    paster.addEventListener('click', e => { if (e.target === paster) closePaster(); });

    document.getElementById('pasteBtn').addEventListener('click', async () => {
      let text = '';
      try { text = await navigator.clipboard.readText(); }
      catch (_) { /* Clipboard API blocked (e.g. HTTP context) — fall through */ }
      if (text) { sendToActive(text); return; }
      openPaster();
    });
  </script>
</body>
</html>
