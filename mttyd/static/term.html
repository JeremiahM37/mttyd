<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>terminal __PORT__</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
  <style>
    /* overscroll-behavior + touch-action prevent the browser from treating
       a drag-down as pull-to-refresh, which otherwise reloads the page the
       moment the user tries to scroll. */
    html, body { margin: 0; padding: 0; height: 100%; background: #000;
                  overscroll-behavior: none; touch-action: none;
                  display: flex; flex-direction: column; color: #cbd5e1;
                  font-family: ui-sans-serif, system-ui, sans-serif; }
    #term { flex: 1; min-height: 0; position: relative; }
    /* Top-right floating toolbar — search / copy / paste / settings. */
    #toolbar { position: absolute; top: 4px; right: 4px; z-index: 5;
                display: flex; gap: 4px; }
    /* Hide toolbar while search is open so its buttons don't intercept
       clicks on search next/prev/close. */
    body:has(#searchbar.on) #toolbar { display: none; }
    .toolbtn { background: #1e293b; border: 1px solid #334155;
                border-radius: 4px; color: #e2e8f0; height: 28px;
                padding: 0 10px; font-size: 12px; font-weight: 500;
                cursor: pointer; touch-action: manipulation;
                font-family: inherit; }
    .toolbtn.icon { width: 28px; padding: 0; font-size: 14px; }
    .toolbtn:active { background: #1e293b; }
    /* Search bar: hidden by default, slides in from top when toggled. */
    #searchbar { display: none; position: absolute; top: 0; left: 0; right: 0;
                  z-index: 4; background: rgba(15,23,42,0.95);
                  border-bottom: 1px solid #1e293b; padding: 6px;
                  align-items: center; gap: 6px; }
    #searchbar.on { display: flex; }
    #searchInput { flex: 1; background: #1e293b; border: 1px solid #334155;
                    color: #e2e8f0; border-radius: 4px; padding: 6px 8px;
                    font-size: 14px; min-width: 0; }
    #searchbar button { background: transparent; border: 0; color: #cbd5e1;
                         font-size: 16px; padding: 6px 10px;
                         touch-action: manipulation; }
    #searchbar button:active { color: #818cf8; }
    /* Optional snippets row above the keybar — one tap = whole command + Enter. */
    #snippetbar { display: none; height: 44px; background: #0b1020;
                   border-top: 1px solid #1e293b; flex-shrink: 0;
                   overflow-x: auto; overflow-y: hidden; white-space: nowrap;
                   -webkit-overflow-scrolling: touch; }
    #snippetbar.on { display: block; }
    .snipbtn { display: inline-block; height: 100%; padding: 0 14px;
                background: transparent; border: 0; border-right: 1px solid #1e293b;
                color: #cbd5e1; font-family: ui-monospace, Menlo, monospace;
                font-size: 13px; touch-action: manipulation; user-select: none; }
    .snipbtn:active { background: #1e293b; color: #818cf8; }
    /* Bottom key bar: arrows + Tab + Esc + Ctrl-C, with long-press for
       secondary keys (Home/End/PgUp/PgDn/Shift-Tab/^D). */
    #keybar { display: flex; height: 44px; background: #0b1020;
               border-top: 1px solid #1e293b; flex-shrink: 0;
               padding-bottom: env(safe-area-inset-bottom, 0); }
    #keybar.off { display: none; }
    .keybtn { flex: 1; background: transparent; border: 0;
               border-right: 1px solid #1e293b; color: #cbd5e1;
               font-family: ui-monospace, Menlo, monospace; font-size: 16px;
               touch-action: manipulation; user-select: none; }
    .keybtn:last-child { border-right: 0; }
    .keybtn:active { background: #1e293b; color: #818cf8; }
    .keybtn.long { color: #818cf8; }    /* flash on longpress */
    /* Reconnect overlay shown when WS closes — gone by default. */
    #reconnect { display: none; position: absolute; inset: 0; z-index: 6;
                  background: rgba(0,0,0,0.75); align-items: center;
                  justify-content: center; flex-direction: column; gap: 10px; }
    #reconnect.on { display: flex; }
    #reconnect button { background: #6366f1; color: white; border: 0;
                         padding: 12px 24px; border-radius: 6px;
                         font-size: 15px; font-weight: 600; }
    /* Settings drawer — modal overlay. */
    #settings { display: none; position: fixed; inset: 0; z-index: 10;
                 background: rgba(0,0,0,0.7); align-items: center;
                 justify-content: center; padding: 16px; }
    #settings.on { display: flex; }
    #settings .panel { background: #0f172a; border: 1px solid #1e293b;
                        border-radius: 8px; padding: 16px; max-width: 480px;
                        width: 100%; max-height: 90vh; overflow-y: auto;
                        font-size: 14px; }
    #settings h2 { margin: 0 0 12px 0; font-size: 16px; }
    #settings label { display: flex; align-items: center; gap: 8px;
                       margin: 8px 0; cursor: pointer; }
    #settings input[type=range] { flex: 1; }
    #settings textarea { width: 100%; box-sizing: border-box; background: #1e293b;
                          color: #e2e8f0; border: 1px solid #334155;
                          border-radius: 4px; padding: 6px;
                          font-family: ui-monospace, Menlo, monospace; font-size: 12px; }
    #settings details summary { cursor: pointer; padding: 6px 0; color: #94a3b8; }
    #settings .done { width: 100%; margin-top: 12px; background: #6366f1;
                       color: white; border: 0; padding: 10px;
                       border-radius: 6px; font-weight: 600; }
  </style>
</head>
<body>
  <div id="term">
    <div id="toolbar">
      <button id="searchBtn"   class="toolbtn" aria-label="search">Find</button>
      <button id="copyBtn"     class="toolbtn" aria-label="copy">Copy</button>
      <button id="pasteBtn"    class="toolbtn" aria-label="paste">Paste</button>
      <button id="settingsBtn" class="toolbtn icon" aria-label="settings">⚙</button>
    </div>
    <div id="searchbar">
      <input id="searchInput" type="text" placeholder="search..."
             autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button id="searchPrev" aria-label="previous">↑</button>
      <button id="searchNext" aria-label="next">↓</button>
      <button id="searchClose" aria-label="close">✕</button>
    </div>
    <div id="reconnect">
      <div>connection closed</div>
      <button id="reconnectBtn">reconnect</button>
    </div>
  </div>
  <div id="snippetbar"></div>
  <div id="keybar">
    <button class="keybtn" data-seq="\x1b[A" data-seq-long="\x1b[5~" data-label="↑" data-label-long="PgUp">↑</button>
    <button class="keybtn" data-seq="\x1b[B" data-seq-long="\x1b[6~" data-label="↓" data-label-long="PgDn">↓</button>
    <button class="keybtn" data-seq="\x1b[D" data-seq-long="\x1b[H" data-label="←" data-label-long="Home">←</button>
    <button class="keybtn" data-seq="\x1b[C" data-seq-long="\x1b[F" data-label="→" data-label-long="End">→</button>
    <button class="keybtn" data-seq="\t" data-seq-long="\x1b[Z" data-label="Tab" data-label-long="⇤Tab">Tab</button>
    <button class="keybtn" data-seq="\x1b" data-label="Esc">Esc</button>
    <button class="keybtn" data-seq="\x03" data-seq-long="\x04" data-label="^C" data-label-long="^D">^C</button>
  </div>
  <div id="settings">
    <div class="panel">
      <h2>Settings</h2>
      <label>Font size <input type="range" id="setFont" min="8" max="30" step="1"></label>
      <label>Theme
        <select id="setTheme">
          <option value="dark">Dark</option>
          <option value="light">Light</option>
          <option value="solarized-dark">Solarized Dark</option>
          <option value="dracula">Dracula</option>
          <option value="nord">Nord</option>
        </select>
      </label>
      <label><input type="checkbox" id="setKeybar"> Show key bar (arrows/Tab/Esc/^C)</label>
      <label><input type="checkbox" id="setLongpress"> Long-press keys for Home/End/PgUp/PgDn/^D</label>
      <label><input type="checkbox" id="setAutoReconnect"> Auto-reconnect when connection drops</label>
      <label><input type="checkbox" id="setWakeLock"> Keep screen on while terminal is open</label>
      <label><input type="checkbox" id="setSnippets"> Show snippets bar</label>
      <details>
        <summary>Snippets (one per line, format: <code>label|command</code>)</summary>
        <textarea id="setSnippetsText" rows="6" placeholder="ls|ls -la&#10;dps|docker ps&#10;tls|tmux ls"></textarea>
      </details>
      <button id="settingsDone" class="done">Done</button>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-search@0.15.0/lib/addon-search.js"></script>
  <script>
    const PORT = __PORT__;
    const HOST = location.hostname;

    // Same defaults ttyd's own page uses, except fontSize is sized for a
    // real mobile viewport (1:1 pixel) rather than a 980px zoomed-out one.
    const term = new window.Terminal({
      fontSize: 12,
      fontFamily: 'Consolas, Menlo, Monaco, "Courier New", monospace',
      cursorBlink: true,
      scrollback: 100000,
      theme: { background: '#000000' },
    });
    const fit = new window.FitAddon.FitAddon();
    term.loadAddon(fit);
    const search = new window.SearchAddon.SearchAddon();
    term.loadAddon(search);
    term.open(document.getElementById('term'));
    fit.fit();

    // Gboard predictive-text fix on the hidden helper textarea. Plain
    // autocomplete="off" gets ignored by Android Gboard about half the
    // time — these extra attributes (inputmode + Grammarly hint + setting
    // again via MutationObserver) catch the cases where xterm.js or the
    // OS resets them.
    // Apply once: setting attributes from inside a MutationObserver that's
    // also listening for attribute changes is an infinite-loop hazard, so
    // only watch childList (xterm.js replacing the textarea) and skip
    // setAttribute when the value is already correct.
    const HELPER_ATTRS = {
      autocomplete: 'off',
      autocorrect: 'off',
      autocapitalize: 'none',
      spellcheck: 'false',
      inputmode: 'url',
      'data-gramm': 'false',
      'data-gramm_editor': 'false',
    };
    function lockHelperAttrs() {
      const helper = document.querySelector('.xterm-helper-textarea');
      if (!helper) return;
      for (const [k, v] of Object.entries(HELPER_ATTRS)) {
        if (helper.getAttribute(k) !== v) helper.setAttribute(k, v);
      }
    }
    lockHelperAttrs();
    // Watch only for childList changes — if xterm.js ever replaces the
    // helper element entirely we re-apply attrs on the new one.
    new MutationObserver(lockHelperAttrs).observe(
      document.body, {childList: true, subtree: true}
    );

    // ttyd 1.7.x WebSocket protocol — JSON_DATA opcode is '{' (literal '{').
    const ws = new WebSocket('ws://' + HOST + ':' + PORT + '/ws', ['tty']);
    ws.binaryType = 'arraybuffer';
    const enc = new TextEncoder();
    const dec = new TextDecoder('utf-8');

    function send(prefix, payload) {
      const body = enc.encode(payload);
      const buf  = new Uint8Array(body.length + 1);
      buf[0] = prefix.charCodeAt(0);
      buf.set(body, 1);
      ws.send(buf);
    }

    ws.onopen = () => {
      send('{', JSON.stringify({AuthToken: "", columns: term.cols, rows: term.rows}));
    };
    ws.onmessage = (ev) => {
      const buf  = new Uint8Array(ev.data);
      const kind = String.fromCharCode(buf[0]);
      if      (kind === '0') term.write(dec.decode(buf.slice(1)));
      else if (kind === '1') document.title = dec.decode(buf.slice(1));
    };
    let reconnectAttempts = 0;
    ws.onclose = () => {
      term.writeln('\r\n[connection closed]\r\n');
      if (settings.autoReconnect && reconnectAttempts < 3) {
        setTimeout(() => location.reload(),
                   1000 * Math.pow(2, reconnectAttempts++));    // 1s, 2s, 4s
      } else {
        document.getElementById('reconnect').classList.add('on');
      }
    };
    document.getElementById('reconnectBtn').addEventListener('click', () => location.reload());

    term.onData(d => { if (ws.readyState === WebSocket.OPEN) send('0', d); });

    function doResize() {
      fit.fit();
      if (ws.readyState === WebSocket.OPEN) {
        send('1', JSON.stringify({columns: term.cols, rows: term.rows}));
      }
    }
    window.addEventListener('resize', doResize);
    new ResizeObserver(doResize).observe(document.getElementById('term'));
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(doResize);

    // Smooth scroll via Pointer Events + setPointerCapture. This is THE
    // modern way to do reliable touch tracking on mobile:
    //   - setPointerCapture redirects all pointermove events to our element
    //     regardless of what's on top — no racing with xterm.js's handlers
    //   - Pointer events don't get coalesced by the browser the way touch
    //     events do, so individual move samples arrive consistently
    //   - Anchored math (target = round((startY - y) / PX_PER_LINE)) means
    //     each move recomputes "where finger is" — no event-loss drift
    (function smoothTouchScroll() {
      const termEl = document.getElementById('term');
      const PX_PER_LINE = 7;       // smaller = faster scroll. 7 = slightly slower than 5.
      const FRICTION   = 0.93;
      const STOP_V     = 0.04;
      let startY = null, prevY = 0, prevT = 0;
      let scrolledLines = 0, velocity = 0, raf = null, activeId = -1;

      function step() {
        const now = performance.now();
        const dt = now - prevT; prevT = now;
        velocity *= Math.pow(FRICTION, dt / 16);
        if (Math.abs(velocity) < STOP_V) { raf = null; return; }
        const lines = Math.round(velocity * dt / PX_PER_LINE);
        if (lines !== 0) term.scrollLines(lines);
        raf = requestAnimationFrame(step);
      }

      termEl.addEventListener('pointerdown', e => {
        if (e.pointerType !== 'touch') return;     // mouse falls through to xterm.js
        if (raf !== null) { cancelAnimationFrame(raf); raf = null; }
        try { termEl.setPointerCapture(e.pointerId); } catch (_) {}
        activeId = e.pointerId;
        startY = e.clientY; prevY = startY;
        prevT = performance.now();
        scrolledLines = 0; velocity = 0;
      });

      termEl.addEventListener('pointermove', e => {
        if (e.pointerId !== activeId || startY === null) return;
        const y = e.clientY;
        const t = performance.now();
        const targetLines = Math.round((startY - y) / PX_PER_LINE);
        const delta = targetLines - scrolledLines;
        if (delta !== 0) {
          term.scrollLines(delta);
          scrolledLines = targetLines;
        }
        const dt = Math.max(t - prevT, 1);
        velocity = (prevY - y) / dt;
        prevY = y; prevT = t;
        if (e.cancelable) e.preventDefault();
      });

      function endPointer(e) {
        if (e.pointerId !== activeId) return;
        activeId = -1;
        startY = null;
        try { termEl.releasePointerCapture(e.pointerId); } catch (_) {}
        if (Math.abs(velocity) > STOP_V) {
          prevT = performance.now();
          raf = requestAnimationFrame(step);
        }
      }
      termEl.addEventListener('pointerup', endPointer);
      termEl.addEventListener('pointercancel', endPointer);
    })();

    // ── Settings ─────────────────────────────────────────────────────────
    // Persisted in localStorage per-port. Drives keybar/snippet/longpress/
    // auto-reconnect/font behaviour. Defaults are conservative; snippets
    // default off because they need user input to be useful.
    const SETTINGS_KEY = 'mttyd_settings_' + PORT;
    const DEFAULTS = {
      fontSize: 12,
      theme: 'dark',
      keybar: true,
      snippets: false,
      snippetsText: '',
      longpress: true,
      autoReconnect: true,
      wakeLock: false,
    };
    const THEMES = {
      'dark':           { background: '#000000', foreground: '#cbd5e1', cursor: '#cbd5e1' },
      'light':          { background: '#ffffff', foreground: '#0f172a', cursor: '#0f172a',
                           selectionBackground: '#94a3b8' },
      'solarized-dark': { background: '#002b36', foreground: '#839496', cursor: '#93a1a1',
                           black: '#073642', red: '#dc322f', green: '#859900', yellow: '#b58900',
                           blue: '#268bd2', magenta: '#d33682', cyan: '#2aa198', white: '#eee8d5' },
      'dracula':        { background: '#282a36', foreground: '#f8f8f2', cursor: '#f8f8f2',
                           black: '#21222c', red: '#ff5555', green: '#50fa7b', yellow: '#f1fa8c',
                           blue: '#bd93f9', magenta: '#ff79c6', cyan: '#8be9fd', white: '#f8f8f2' },
      'nord':           { background: '#2e3440', foreground: '#d8dee9', cursor: '#d8dee9',
                           black: '#3b4252', red: '#bf616a', green: '#a3be8c', yellow: '#ebcb8b',
                           blue: '#81a1c1', magenta: '#b48ead', cyan: '#88c0d0', white: '#e5e9f0' },
    };
    function loadSettings() {
      try { return Object.assign({}, DEFAULTS, JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}')); }
      catch (_) { return Object.assign({}, DEFAULTS); }
    }
    function saveSettings() { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }
    let settings = loadSettings();

    function parseSnippets(text) {
      return text.split('\n').map(line => {
        line = line.trim();
        if (!line) return null;
        const i = line.indexOf('|');
        return i >= 0 ? {label: line.slice(0,i).trim(), cmd: line.slice(i+1).trim()}
                      : {label: line.slice(0, 12), cmd: line};
      }).filter(Boolean);
    }

    function renderSnippets() {
      const bar = document.getElementById('snippetbar');
      const items = parseSnippets(settings.snippetsText);
      bar.innerHTML = items.map(s =>
        `<button class="snipbtn" data-cmd="${s.cmd.replace(/"/g,'&quot;')}">${s.label}</button>`
      ).join('');
      bar.classList.toggle('on', settings.snippets && items.length > 0);
      bar.querySelectorAll('.snipbtn').forEach(b => {
        b.addEventListener('click', () => {
          if (ws.readyState === WebSocket.OPEN) send('0', b.dataset.cmd + '\r');
        });
      });
    }

    // Wake Lock — keep the screen from auto-sleeping while term is open.
    // Released automatically when the tab is hidden; re-acquired on visible.
    let wakeLock = null;
    async function acquireWakeLock() {
      if (!settings.wakeLock || !navigator.wakeLock || wakeLock) return;
      try { wakeLock = await navigator.wakeLock.request('screen'); } catch (_) {}
    }
    async function releaseWakeLock() {
      if (wakeLock) { try { await wakeLock.release(); } catch (_) {} wakeLock = null; }
    }
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') acquireWakeLock();
      else releaseWakeLock();
    });

    function applySettings() {
      term.options.fontSize = settings.fontSize;
      term.options.theme    = THEMES[settings.theme] || THEMES.dark;
      document.getElementById('keybar').classList.toggle('off', !settings.keybar);
      renderSnippets();
      if (settings.wakeLock) acquireWakeLock(); else releaseWakeLock();
      doResize();    // fontSize change needs a refit
    }
    applySettings();

    // Settings drawer wiring.
    const drawer = document.getElementById('settings');
    function syncSettingsForm() {
      document.getElementById('setFont').value = settings.fontSize;
      document.getElementById('setTheme').value = settings.theme;
      document.getElementById('setKeybar').checked = settings.keybar;
      document.getElementById('setLongpress').checked = settings.longpress;
      document.getElementById('setAutoReconnect').checked = settings.autoReconnect;
      document.getElementById('setWakeLock').checked = settings.wakeLock;
      document.getElementById('setSnippets').checked = settings.snippets;
      document.getElementById('setSnippetsText').value = settings.snippetsText;
    }
    document.getElementById('settingsBtn').addEventListener('click', () => {
      syncSettingsForm();
      drawer.classList.add('on');
    });
    document.getElementById('settingsDone').addEventListener('click', () => {
      settings.fontSize      = parseInt(document.getElementById('setFont').value) || DEFAULTS.fontSize;
      settings.theme         = document.getElementById('setTheme').value;
      settings.keybar        = document.getElementById('setKeybar').checked;
      settings.longpress     = document.getElementById('setLongpress').checked;
      settings.autoReconnect = document.getElementById('setAutoReconnect').checked;
      settings.wakeLock      = document.getElementById('setWakeLock').checked;
      settings.snippets      = document.getElementById('setSnippets').checked;
      settings.snippetsText  = document.getElementById('setSnippetsText').value;
      saveSettings();
      applySettings();
      drawer.classList.remove('on');
    });
    drawer.addEventListener('click', e => {
      if (e.target === drawer) drawer.classList.remove('on');   // tap backdrop closes
    });

    // ── Key bar with long-press support ──────────────────────────────────
    // Pointer-based for reliable long-press detection. Short press fires
    // data-seq on pointerup; long press (≥500ms) fires data-seq-long while
    // still held, with a haptic vibration if the device supports it.
    //
    // HTML attributes hold control sequences as readable text like
    // "[A" / "" / "	". The browser reads those as 6/4/2 literal
    // chars (HTML attrs don't interpret escapes), so we have to decode
    // them into actual bytes before sending — otherwise the keybar just
    // types junk into the prompt instead of triggering Up arrow / Ctrl-C.
    function decodeSeq(s) {
      return (s || '')
        .replace(/\\x([0-9a-fA-F]{2})/g, (_, hex) => String.fromCharCode(parseInt(hex, 16)))
        .replace(/\\t/g, '\t')
        .replace(/\\r/g, '\r')
        .replace(/\\n/g, '\n');
    }

    const LONGPRESS_MS = 500;
    document.querySelectorAll('.keybtn').forEach(btn => {
      let timer = null, fired = false;
      function clear() { if (timer) { clearTimeout(timer); timer = null; } }
      btn.addEventListener('pointerdown', e => {
        e.preventDefault();
        fired = false;
        const longSeq = decodeSeq(btn.dataset.seqLong);
        if (settings.longpress && longSeq) {
          timer = setTimeout(() => {
            fired = true;
            if (ws.readyState === WebSocket.OPEN) send('0', longSeq);
            btn.classList.add('long');
            if (navigator.vibrate) navigator.vibrate(20);
            setTimeout(() => btn.classList.remove('long'), 150);
          }, LONGPRESS_MS);
        }
      });
      btn.addEventListener('pointerup', () => {
        clear();
        if (!fired && ws.readyState === WebSocket.OPEN) send('0', decodeSeq(btn.dataset.seq));
      });
      btn.addEventListener('pointerleave', clear);
      btn.addEventListener('pointercancel', clear);
    });

    // ── Search through scrollback ───────────────────────────────────────
    const searchbar = document.getElementById('searchbar');
    const searchInput = document.getElementById('searchInput');
    function doSearch(dir) {
      const q = searchInput.value;
      if (!q) return;
      const opts = { decorations: { matchBackground: '#6366f1',
                                       activeMatchBackground: '#a855f7' } };
      if (dir === 'next') search.findNext(q, opts);
      else                search.findPrevious(q, opts);
    }
    document.getElementById('searchBtn').addEventListener('click', () => {
      searchbar.classList.add('on');
      searchInput.focus();
    });
    document.getElementById('searchNext').addEventListener('click', () => doSearch('next'));
    document.getElementById('searchPrev').addEventListener('click', () => doSearch('prev'));
    document.getElementById('searchClose').addEventListener('click', () => {
      searchbar.classList.remove('on');
      search.clearDecorations();
    });
    searchInput.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); doSearch(e.shiftKey ? 'prev' : 'next'); }
      if (e.key === 'Escape') { e.preventDefault(); searchbar.classList.remove('on'); search.clearDecorations(); }
    });

    // ── Copy / Paste ────────────────────────────────────────────────────
    // Copy: prefer the user's selection (works on desktop or after tap-and-
    // -hold to select on mobile); fall back to nothing rather than copying
    // accidental content.
    document.getElementById('copyBtn').addEventListener('click', async () => {
      const sel = term.getSelection();
      if (!sel) return;
      try { await navigator.clipboard.writeText(sel); } catch (_) {}
    });
    // Paste: read clipboard, send to ttyd as if typed.
    document.getElementById('pasteBtn').addEventListener('click', async () => {
      try {
        const text = await navigator.clipboard.readText();
        if (text && ws.readyState === WebSocket.OPEN) send('0', text);
      } catch (_) {}
    });
  </script>
</body>
</html>
