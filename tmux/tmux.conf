# Recommended tmux config for use with phonetty.
#
# Append these lines to ~/.tmux.conf (or whatever config you load before
# the persistent session is created).

# mouse off — touch/scroll passes through instead of trapping the user in
# copy-mode (which is hard to exit on a phone keyboard, since the standard
# exit key is `q`). Trade-off: scrolling history requires `Ctrl-b [` then
# PgUp manually. If you have a real keyboard and prefer mouse-wheel scroll,
# flip this to `on` and remember `q` exits copy-mode.
set -g mouse off

# Big scrollback so capture-pane on attach can replay a long history into
# xterm.js's buffer.
set -g history-limit 100000

# Disable the alternate screen so full-screen TUIs (claude, vim, less) write
# to the normal scrollback buffer instead of hiding it.
set -ga terminal-overrides ',*:smcup@:rmcup@'
