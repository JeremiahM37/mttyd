# Recommended tmux config for use with phonetty.
#
# Append these lines to ~/.tmux.conf (or whatever config you load before
# the persistent session is created).

# mouse off — let xterm.js's touch handler do the scrolling, not tmux's
# copy-mode. With mouse on, every drag enters copy-mode and your phone
# can't scroll the browser viewport.
set -g mouse off

# Big scrollback — phonetty replays the last 100k lines into xterm.js on
# attach. Set this high enough to cover your typical session.
set -g history-limit 100000

# Disable the alternate screen so full-screen TUIs (claude, vim, less) write
# to the normal scrollback buffer instead of hiding it. Without this, xterm.js
# only ever sees the latest screen and you can't scroll up past it.
set -ga terminal-overrides ',*:smcup@:rmcup@'
